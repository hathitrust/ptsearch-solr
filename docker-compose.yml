services:

  solr:
    build: .
    ports:
      - "8983:8983"
    environment:
      SOLR_MODULES: analysis-extras
      SOLR_OPTS: -Dlog4j2.disable.jmx=true
      LOG4J_PROPS: /opt/solr/server/resources/log4j2-console.xml
    command: solr-foreground --user-managed

  test:
    image: curlimages/curl
    depends_on:
      - solr
    command: curl --retry-connrefused --retry 5 --retry-delay 5 --fail-with-body 'http://solr:8983/solr/ptsearch/admin/ping'
