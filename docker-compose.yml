version: '3'

services:

  solr:
    build: .
    ports:
      - "8983:8983"
    environment:
      SOLR_MODULES: analysis-extras

  test:
    image: curlimages/curl
    depends_on:
      - solr
    command: curl --retry-connrefused --retry 5 --retry-delay 5 --fail-with-body 'http://solr:8983/solr/ptsearch/admin/ping'
